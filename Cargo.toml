[package]
name = "fr-rust"
version = "0.1.0"
edition = "2021"

[dependencies]
# Web, Files and WebSocket
actix-web = "4.9"
actix-ws = "0.3"
actix-files = "0.6"
actix-multipart = "0.6"

# Async and Utilities
tokio = { version = "1.40", features = ["full"] }
futures-util = "0.3"
dashmap = "6.1"
anyhow = "1.0"
uuid = { version = "1.10", features = ["v4", "serde"] }
dotenvy = "0.15"

# Serialization & JSON
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Database
tokio-postgres = "0.7"
deadpool-postgres = "0.14"

# Security and Hashing
argon2 = "0.5"
aes-gcm = "0.10"
hmac = "0.12"
sha2 = "0.10"
base64 = "0.22"

# Randomness
rand = "0.8"
hex = "0.4"

# Email
lettre = { version = "0.11.22", default-features = false, features = [
    "tokio1",
    "smtp-transport",
    "builder",
    "rustls-tls",
    "tokio1-rustls"
] }

# Redis
deadpool-redis = "0.23"

# Web Socket
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
async-trait = "0.1"

# JWT
jsonwebtoken = "9"
