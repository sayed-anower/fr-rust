[package]
name = "fr-rust"
version = "0.1.0"
edition = "2024"
authors = ["Sayed Anower <sayed.anower.17.2@gmail.com>"]
description = "A comprehensive framework/utility library for Actix-web, Postgres, Redis, and authentication."
license = "MIT"
repository = "https://github.com/sayed-anower/fr-rust"
documentation = "https://docs.rs/fr-rust"
readme = "DOCUMENTATION.md"
keywords = ["actix-web", "postgres", "redis", "auth", "websocket"]
categories = ["web-programming", "asynchronous"]

[dependencies]
# Required / Core Utilities
tokio = { version = "1.40", features = ["full"] }
anyhow = "1.0"
dashmap = "6.1"
dotenvy = "0.15"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
base64 = "0.22"
hex = "0.4"
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
async-trait = "0.1"
uuid = { version = "1.10", features = ["v4", "serde"] }

# Actix / Web Stack
actix-web = "4.9"
actix-ws = "0.3"
actix-files = "0.6"
actix-multipart = "0.6"
futures-util = "0.3"

# Database Stack
tokio-postgres = "0.7"
deadpool-postgres = "0.14"

# Security, Crypto & Auth
argon2 = "0.5"
aes-gcm = "0.10"
hmac = "0.12"
sha2 = "0.10"
rand = "0.8"
jsonwebtoken = "9"

# Email
lettre = { version = "0.11.22", default-features = false, features = ["tokio1", "smtp-transport", "builder", "rustls-tls", "tokio1-rustls"] }

# Redis Stack
deadpool-redis = "0.23"

