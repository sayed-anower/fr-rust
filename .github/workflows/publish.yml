name: Publish to crates.io

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish Crate
    runs-on: ubuntu-latest
    
    # 1. Tells GitHub to use the 'production' environment settings
    environment: production

    # 2. Grants permission to generate the OIDC token for crates.io
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Run tests (Safety check)
      run: cargo test --all-features --verbose

    - name: Verify package layout and validity
      run: cargo package --verbose

    # 3. Explicitly passes the system OIDC token to handle trusted publishing smoothly
    - name: Publish to crates.io
      run: cargo publish --token ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
